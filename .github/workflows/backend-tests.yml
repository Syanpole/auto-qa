name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'pytest.ini'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: autoqa_test
          POSTGRES_USER: autoqa
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/test.txt
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://autoqa:testpass@localhost:5432/autoqa_test
        run: |
          cd backend
          python manage.py migrate
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://autoqa:testpass@localhost:5432/autoqa_test
        run: |
          pytest backend/tests/ --cov=apps --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
      
      - name: Generate coverage report
        if: always()
        run: |
          coverage report
          coverage html

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint
      
      - name: Check code formatting with black
        run: |
          black --check backend/
      
      - name: Check import sorting with isort
        run: |
          isort --check-only backend/
      
      - name: Lint with flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Type check with mypy
        run: |
          pip install django-stubs djangorestframework-stubs
          mypy backend/ --ignore-missing-imports --no-error-summary 2>/dev/null || true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run security checks with bandit
        run: |
          bandit -r backend/ -ll || true
      
      - name: Check dependencies with safety
        run: |
          safety check --file backend/requirements/base.txt --json || true
