name: ML Service Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-service-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ml-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-service/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run unit tests
        run: |
          pytest ml-service/tests/ --cov=app --cov-report=xml -v
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint
      
      - name: Check code formatting
        run: |
          black --check ml-service/
      
      - name: Check import sorting
        run: |
          isort --check-only ml-service/
      
      - name: Lint
        run: |
          flake8 ml-service/ --max-line-length=120 --exit-zero
